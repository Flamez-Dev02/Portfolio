<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | DANIEL IYANDA</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <!-- Custom Style -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* Specific Inbox Styles using Global Variables */
    body { padding: 40px 20px; }
    
    .back-btn {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 100;
      padding: 12px 25px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--primary);
      color: var(--primary);
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .back-btn:hover {
      background: var(--primary);
      color: #000;
      box-shadow: 0 0 20px var(--primary-glow);
    }

    .inbox-wrapper {
      max-width: 1100px;
      margin: 100px auto 0;
    }

    .contact-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .info-item {
      margin-bottom: 25px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 15px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .info-item:hover {
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.04);
    }

    .form-control {
      background: rgba(255, 255, 255, 0.02) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: var(--text-main) !important;
      padding: 15px !important;
      border-radius: 12px !important;
    }

    .form-control:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 15px var(--primary-glow) !important;
    }

    @media (max-width: 768px) {
      .contact-container { grid-template-columns: 1fr; }
      .back-btn { top: 15px; left: 15px; padding: 8px 15px; }
    }
  </style>
</head>
<body>

  <!-- Back Button -->
  <a href="index.html" class="back-btn">
    <i class="bi bi-arrow-left me-2"></i>Back to Home
  </a>

  <!-- Main Container -->
  <div class="inbox-wrapper">
    <div class="text-center mb-5">
      <h1 class="display-4 fw-bold glow-text">Let's Connect</h1>
      <p class="text-muted">Currently active and looking for new creative collaborations.</p>
    </div>

    <div class="contact-container">
      <!-- Info -->
      <section class="glass-card">
        <h2 class="h3 fw-bold mb-4 glow-text">Reach Out Directly</h2>
        
        <div class="info-item">
          <div class="text-info small fw-bold text-uppercase mb-1">Email</div>
          <a href="mailto:flamezdev.tech@gmail.com" class="text-decoration-none text-white h5">flamezdev.tech@gmail.com</a>
        </div>

        <div class="info-item">
          <div class="text-info small fw-bold text-uppercase mb-1">WhatsApp</div>
          <a href="https://wa.me/2348060763384" class="text-decoration-none text-white h5">+234 806 076 3384</a>
        </div>

        <div class="info-item">
          <div class="text-info small fw-bold text-uppercase mb-1">Location</div>
          <div class="text-white h5">Lead City University Ibadan, Oyo State, Nigeria</div>
        </div>
      </section>

      <!-- Form -->
      <section class="glass-card">
        <h2 class="h3 fw-bold mb-4 glow-text">Send a Message</h2>
        <form id="contactForm" action="https://formspree.io/f/mpwqlvpe" method="POST">
          <div class="mb-3">
            <label class="form-label small text-muted">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="Daniel Iyanda" required>
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label small text-muted">Your Message</label>
            <textarea name="message" class="form-control" rows="4" placeholder="How can I help you?" required></textarea>
          </div>
          <!-- Hidden Anti-Spam Field -->
          <input type="text" name="_gotcha" class="d-none" aria-hidden="true" tabindex="-1">
          <button type="submit" class="btn btn-primary-custom w-100 p-3">Launch Message</button>
        </form>
      </section>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script src="inboxContact.js"></script>
</body>
</html>
